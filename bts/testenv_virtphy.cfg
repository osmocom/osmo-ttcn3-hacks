[testsuite]
program=BTS_Tests
config=BTS_Tests_VIRTPHY.cfg

[bsc]
program=osmo-bsc
make=osmo-bsc
package=osmo-bsc
copy=osmo-bsc.cfg

[fake-trx]
program=run_fake_trx.sh
make=.make.osmocom-bb.clone

[virtphy]
program=virtphy -s /tmp/osmocom_l2
make=virtphy

[bts]
prepare=prepare_virtphy.sh
program=osmo-bts-virtual -c osmo-bts-virtphy.cfg
make=osmo-bts
package=osmo-bts libosmocore-utils
copy=osmo-bts.cfg osmo-bts-virtphy.confmerge
vty_port=4241
