[testsuite]
program=BTS_Tests
config=fh/BTS_Tests.cfg
copy=BTS_Tests.cfg

[bts]
program=osmo-bts-trx
make=osmo-bts
package=osmo-bts-trx
copy=osmo-bts.cfg

[bsc]
program=osmo-bsc -c fh/osmo-bsc.cfg
make=osmo-bsc
package=osmo-bsc libosmocore-utils
copy=osmo-bsc.cfg fh/osmo-bsc.confmerge
prepare=osmo-config-merge osmo-bsc.cfg fh/osmo-bsc.confmerge > fh/osmo-bsc.cfg

[fake-trx]
program=run_fake_trx.sh
make=.make.osmocom-bb.clone

[trxcon]
program=trxcon
make=trxcon
