[ORDERED_INCLUDE]
# Common configuration, shared between test suites
"../Common.cfg"
# testsuite specific configuration, not expected to change
"./smdpp2_Tests.default"

# Local configuration below

[LOGGING]
SourceInfoFormat := Single
LogEventTypes := Subcategories
LogEntityName := Yes

[TESTPORT_PARAMETERS]
system.HTTP_server_port.KEYFILE := "../ipad/example_ca/pki/private/alttest.key"
system.HTTP_server_port.CERTIFICATEFILE := "../ipad/example_ca/pki/issued/alttest.crt"

[MODULE_PARAMETERS]
# ES9+ server settings
tsp_es9p_base_url := "https://your-smdp-server.com"
tsp_server_ca_cert := "/path/to/ca-cert.pem"

# Certificate paths
tsp_certificate_path := "./certs"
tsp_euicc_certificate := "CERT_EUICC_ECDSA_NIST.der"
tsp_euicc_private_key := "SK_EUICC_ECDSA_NIST.pem"
tsp_eum_certificate := "CERT_EUM_ECDSA_NIST.der"
tsp_ci_certificate := "CERT_CI_ECDSA_NIST.der"

# Output directory
tsp_output_path := "./output"

# Command and operation parameters
tsp_command := "download"
tsp_matching_id := "your-matching-id"
tsp_confirmation_code := "your-confirmation-code"

# For notifications
tsp_sequence_nr := 12345
tsp_operation := "install"
tsp_notification_address := "https://notification-server.com"
tsp_iccid := "123456789012345678F"
tsp_transaction_id := "your-transaction-id"
tsp_smdpp_oid := "your-smdp-oid"
tsp_isdp_aid := "A0000001515350"
tsp_sima_response := "your-sima-response-hex"

[MAIN_CONTROLLER]
KillTimer := 10
LocalAddress := 127.0.0.1
TCPPort := 9999
# NumHCs := 1

[EXECUTE]
smdpp2_Tests.TC_ES9P_Client